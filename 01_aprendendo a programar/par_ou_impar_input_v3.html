<!DOCTYPE html>
<html>
<body>

<h1>Par ou Ímpar</h1>

<p id="resultado"></p>

<script>
function verificarParOuImpar(numero) {
    return numero % 2 === 0 ? "Par" : "Ímpar"
}

let numero = Number(prompt("Digite um número:"))

document.getElementById("resultado").innerText = verificarParOuImpar(numero)
</script>

</body>
</html>
