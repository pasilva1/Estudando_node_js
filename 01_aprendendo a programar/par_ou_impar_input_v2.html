<!DOCTYPE html>
<html>
<head>
    <title>Par ou Ímpar</title>
</head>
<body>

<h1>Verificar número</h1>

<script>
function verificarParOuImpar(numero) {
    return numero % 2 === 0 ? "Par" : "Ímpar"
}

let numero = Number(prompt("Digite um número:"))

console.log(verificarParOuImpar(numero))
</script>

</body>
</html>
